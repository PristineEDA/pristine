appId: com.pristine.ide
productName: Pristine
directories:
  buildResources: build
  output: release/${version}
files:
  - dist/**/*
  - dist-electron/**/*
protocols:
  - name: Pristine Auth Callback
    schemes:
      - pristine
extraResources:
  - from: binaries
    to: binaries
    filter:
      - '**/*'
  - from: .
    to: licenses
    filter:
      - LICENSE
      - ATTRIBUTIONS.md
      - NOTICE
  - from: licenses/pristine-engine
    to: licenses/pristine-engine
    filter:
      - '**/*'
asar: true
asarUnpack:
  - node_modules/node-pty/**
  - node_modules/better-sqlite3/**

win:
  icon: icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  icon: icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.developer-tools
