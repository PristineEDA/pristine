appId: com.pristine.ide
productName: Pristine
directories:
  buildResources: build
  output: release/${version}
files:
  - dist/**/*
  - dist-electron/**/*
asar: true
asarUnpack:
  - node_modules/node-pty/**

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.developer-tools
