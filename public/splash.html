<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pristine Loading</title>
    <style>
      :root {
        color-scheme: dark;
        --splash-background: #191a1b;
        --splash-foreground: rgba(255, 255, 255, 0.88);
        background: var(--splash-background);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--splash-background);
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        user-select: none;
        -webkit-user-drag: none;
      }

      .label {
        position: absolute;
        left: 28px;
        bottom: 22px;
        color: var(--splash-foreground);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const backgroundColor = params.get('backgroundColor');
        const themeKind = params.get('themeKind');

        if (themeKind === 'light' || themeKind === 'dark') {
          document.documentElement.style.colorScheme = themeKind;
          document.documentElement.style.setProperty(
            '--splash-foreground',
            themeKind === 'light' ? 'rgba(15, 23, 42, 0.86)' : 'rgba(255, 255, 255, 0.88)',
          );
        }

        if (backgroundColor) {
          document.documentElement.style.setProperty('--splash-background', backgroundColor);
          document.documentElement.style.background = backgroundColor;
        }
      })();
    </script>
  </head>
  <body>
    <main class="frame" data-testid="splash-screen" aria-label="Pristine splash screen">
      <!-- <img class="image" src="./splash.png" alt="Pristine splash image" /> -->
      <div class="label">Pristine IDE</div>
    </main>
  </body>
  </html>
