name: CI

on:
  push:
    branches:
      - dev
      - main
    tags:
      - '*'
  pull_request:
  release:
    types:
      - published

env:
  PRISTINE_EMPTY_WALLPAPER_URL: https://raw.githubusercontent.com/PristineEDA/pristine-res/main/images/empty-wallpaper.png

jobs:
  package-gate:
    name: Package Gate
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-24.04
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check package eligibility
        id: check
        shell: bash
        run: |
          enabled=false

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            if [[ "${{ github.event.release.target_commitish }}" == "main" ]]; then
              enabled=true
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            git fetch origin main --depth=1
            if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
              enabled=true
            fi
          fi

          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"

  test:
    name: Test Suite ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - &platform_ubuntu_2204_x64
            id: &platform_id_ubuntu_2204_x64 ubuntu-22.04-x64
            runner: &platform_runner_ubuntu_2204_x64 ubuntu-22.04
          - &platform_ubuntu_2404_x64
            id: &platform_id_ubuntu_2404_x64 ubuntu-24.04-x64
            runner: &platform_runner_ubuntu_2404_x64 ubuntu-24.04
            enable_coverage: true
          - &platform_windows_2025_x64
            id: &platform_id_windows_2025_x64 windows-2025-x64
            runner: &platform_runner_windows_2025_x64 windows-2025
          - &platform_windows_2022_x64
            id: &platform_id_windows_2022_x64 windows-2022-x64
            runner: &platform_runner_windows_2022_x64 windows-2022
          - &platform_macos_26_arm64
            id: &platform_id_macos_26_arm64 macos-26-arm64
            runner: &platform_runner_macos_26_arm64 macos-26
          - &platform_macos_26_x64
            id: &platform_id_macos_26_x64 macos-26-x64
            runner: &platform_runner_macos_26_x64 macos-26-intel
          - &platform_macos_15_arm64
            id: &platform_id_macos_15_arm64 macos-15-arm64
            runner: &platform_runner_macos_15_arm64 macos-15
          - &platform_macos_15_x64
            id: &platform_id_macos_15_x64 macos-15-x64
            runner: &platform_runner_macos_15_x64 macos-15-intel
          - &platform_macos_14_arm64
            id: &platform_id_macos_14_arm64 macos-14-arm64
            runner: &platform_runner_macos_14_arm64 macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare external assets
        run: pnpm run prepare:assets

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run unit tests with coverage report
        if: matrix.enable_coverage == true
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: >-
          pnpm exec vitest run --coverage
          --coverage.thresholds.lines=0
          --coverage.thresholds.statements=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.functions=0

      - name: Run unit tests
        if: matrix.enable_coverage != true
        run: pnpm test:unit

      - name: Configure Electron sandbox on Linux
        if: runner.os == 'Linux'
        run: |
          sandbox_path="$(readlink -f node_modules/electron/dist/chrome-sandbox)"
          sudo chown root:root "$sandbox_path"
          sudo chmod 4755 "$sandbox_path"
          echo "CHROME_DEVEL_SANDBOX=$sandbox_path" >> "$GITHUB_ENV"

      - name: Install Linux window manager for E2E
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y openbox

      - name: Run E2E tests on Linux
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a --server-args="-screen 0 1280x720x24" sh -c 'openbox >/tmp/openbox.log 2>&1 & pnpm test:e2e'

      - name: Run E2E tests on macOS and Windows
        if: runner.os != 'Linux' && matrix.id != 'windows-2022-x64'
        run: pnpm test:e2e

      - name: Run E2E tests on Windows 2022 with known flaky case skipped
        if: matrix.id == 'windows-2022-x64'
        run: >-
          pnpm exec playwright test --max-failures=1
          --grep-invert "Explorer rename and delete keep the tree scroll position near the bottom after refreshes"

      - name: Upload Playwright report
        if: failure() && hashFiles('playwright-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.id }}
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload coverage report
        if: always() && matrix.enable_coverage == true && hashFiles('coverage/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.id }}
          path: coverage
          if-no-files-found: ignore

  runtime-perf:
    name: Runtime Perf ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: *platform_id_windows_2025_x64
            runner: *platform_runner_windows_2025_x64
            builder_args: --win nsis portable --x64
          - id: *platform_id_windows_2022_x64
            runner: *platform_runner_windows_2022_x64
            builder_args: --win nsis portable --x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python for native rebuilds
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare external assets
        run: pnpm run prepare:assets

      - name: Package application
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm run build:app && pnpm exec electron-builder ${{ matrix.builder_args }} --config electron-builder.yml --publish never

      - name: Run runtime performance comparison
        shell: powershell
        run: |
          $perfResultsDir = Join-Path $PWD 'perf-results'
          New-Item -ItemType Directory -Path $perfResultsDir -Force | Out-Null
          $consoleLogPath = Join-Path $perfResultsDir 'compare-perf-console.log'
          & .\compare-perf-taskmgr.ps1 -DurationSeconds 30 -ThresholdPercent 3 -MemoryThresholdPercent 0.5 -ResultOutputDirectory $perfResultsDir *>&1 | Tee-Object -FilePath $consoleLogPath
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Publish runtime performance summary
        if: always()
        shell: powershell
        run: |
          $summaryPath = $env:GITHUB_STEP_SUMMARY
          if ([string]::IsNullOrWhiteSpace($summaryPath)) {
            exit 0
          }

          $perfResultsDir = Join-Path $PWD 'perf-results'
          $reportPath = Join-Path $perfResultsDir 'comparison-report.txt'
          $errorPath = Join-Path $perfResultsDir 'comparison-error.txt'

          if (-not (Test-Path -LiteralPath $reportPath) -and -not (Test-Path -LiteralPath $errorPath)) {
            exit 0
          }

          Add-Content -LiteralPath $summaryPath -Value "## Runtime Perf ${{ matrix.id }}"
          Add-Content -LiteralPath $summaryPath -Value ''
          Add-Content -LiteralPath $summaryPath -Value '```text'

          if (Test-Path -LiteralPath $reportPath) {
            Get-Content -LiteralPath $reportPath | Add-Content -LiteralPath $summaryPath
          } else {
            Get-Content -LiteralPath $errorPath | Add-Content -LiteralPath $summaryPath
          }

          Add-Content -LiteralPath $summaryPath -Value '```'

      - name: Upload runtime performance artifacts
        if: always() && hashFiles('perf-results/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: runtime-perf-${{ matrix.id }}
          path: perf-results
          if-no-files-found: error

  package:
    name: Package ${{ matrix.id }}
    if: needs.package-gate.outputs.enabled == 'true'
    needs:
      - test
      - package-gate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: *platform_id_ubuntu_2204_x64
            runner: *platform_runner_ubuntu_2204_x64
            builder_args: --linux AppImage deb --x64
          - id: *platform_id_ubuntu_2404_x64
            runner: *platform_runner_ubuntu_2404_x64
            builder_args: --linux AppImage deb --x64
          - id: *platform_id_windows_2025_x64
            runner: *platform_runner_windows_2025_x64
            builder_args: --win nsis portable --x64
          - id: *platform_id_windows_2022_x64
            runner: *platform_runner_windows_2022_x64
            builder_args: --win nsis portable --x64
          - id: *platform_id_macos_26_x64
            runner: *platform_runner_macos_26_x64
            builder_args: --mac dmg --x64
          - id: *platform_id_macos_26_arm64
            runner: *platform_runner_macos_26_arm64
            builder_args: --mac dmg --arm64
          - id: *platform_id_macos_15_x64
            runner: *platform_runner_macos_15_x64
            builder_args: --mac dmg --x64
          - id: *platform_id_macos_15_arm64
            runner: *platform_runner_macos_15_arm64
            builder_args: --mac dmg --arm64
          - id: *platform_id_macos_14_arm64
            runner: *platform_runner_macos_14_arm64
            builder_args: --mac dmg --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python for native rebuilds
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare external assets
        run: pnpm run prepare:assets

      - name: Package application
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm run build:app && pnpm exec electron-builder ${{ matrix.builder_args }} --config electron-builder.yml --publish never

      - name: Upload package artifacts
        if: always() && hashFiles('release/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pristine-${{ matrix.id }}
          path: release/**
          if-no-files-found: error